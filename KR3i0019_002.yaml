body:
  text: 茶經卷中唐陸羽撰四茶之器風爐灰承筥炭檛火策鍑交床夾紙囊碾羅合則水方漉水囊瓢竹策鹺簋楬熟盂碗畚札滌方滓方巾具列都籃風爐灰承風爐以銅鐵鑄之如古鼎形厚三分緣闊九分令六分虛中致其圬墁凡三足古文書二十一字一足云坎上巽下離于中一足云體均五行去百疾一足云聖唐年號某年鑄其三足之間設三窗底一窗以為通飈漏燼之所上並古文書六字一窗之上書伊公二字一窗之上書羮陸二字一窗之上書氏茶二字所謂伊公羮陸氏茶也置墆􅀈於其內設三格其一格有翟焉翟者火禽也畫一卦曰離其一格有彪焉彪者風獸也畫一卦曰巽其一格有魚焉魚者水蟲也畫一卦曰坎巽主風離主火坎主水風能興火火能熟水故備其三卦焉其飾以連葩垂蔓曲水方文之類其爐或煆鐵為之或運泥為之其灰承作三足鐵柈檯之筥筥以竹織之髙一尺二寸徑闊七寸或用藤作木楦如筥形織之六出圎眼其底蓋若利篋口鑠之炭檛炭檛以鐵六稜制之長一尺鋭一豐中執細頭系一小􅀈以飾檛也若今之河隴軍人木吾也或作鎚或作釜隨其便也火策火策一名筯若常用者圓直一尺三寸頂平截無蔥臺勾鎖之屬以鐵或熟銅製之鍑音輔或作釡或作釜鍑以生鐵為之今人有業冶者所謂急鐵其鐵以耕刀之趄錬而鑄之內摸土而外摸沙土滑於內易其摩滌沙澀於外吸其炎焰方其耳以正令也廣其緣以務逺也長其臍以守中也臍長則沸中沸中則末易揚末易揚則其味淳也洪州以瓷為之萊州以石為之瓷與石皆雅器也性非堅實難可持久用銀為之至潔但涉於侈麗雅則雅矣潔亦潔矣若用之恆而卒歸於銀也交牀交牀以十字交之剜中令虛以支鍑也夾夾以小青竹為之長一尺二寸令一寸有節節已上剖之以炙茶也彼竹之篠津潤於火假其香潔以益茶味恐非林谷間莫之致或用精鐵熟銅之類取其久紙囊紙囊以剡藤紙白厚者夾縫之以貯所炙茶使不泄其香也碾拂末碾以橘木為之次以梨桑桐柘為之內圓而外方內圓備於運行也外方制其傾危也內容墮而外無餘木墮形如車輪不輻而軸焉長九寸闊一寸七分墮徑三寸八分中厚一寸邉厚半寸軸中方而執圓其拂末以鳥羽製之羅合羅末以合蓋貯之以則置合中用巨竹剖而屈之以紗絹衣之其合以竹節為之或屈杉以漆之髙三寸蓋一寸底二寸口徑四寸則則以海貝蠣蛤之屬或以銅鐵竹匕䇿之類則者量也準也度也凡煮水一升用末方寸匕若好薄者減之嗜濃者增之故云則也水方水方以椆木槐楸梓等合之其裏并外縫漆之受一斗漉水囊漉水囊若常用者其格以生銅鑄之以備水濕無有苔穢腥澀意以熟銅苔穢鐵腥澀也林棲谷隱者或用之竹木木與竹非持久涉逺之具故用之生銅其囊織青竹以捲之裁碧縑以縫之細翠鈿以綴之又作緑油囊以貯之圓徑五寸柄一寸五分瓢瓢一曰犧杓剖瓠為之或刋木為之晉舍人杜育荈賦云酌之以匏匏瓢也口闊脛薄柄短永嘉中餘姚人虞洪入瀑布山採茗遇一道士云吾丹丘子祈子他日甌犧之餘乞相遺也犧木杓也今常用以梨木為之竹策竹策或以桃栁蒲葵木為之或以柿心木為之長一尺銀裹兩頭鹺簋鹺簋以瓷為之圓徑四寸若合形或瓶或罍貯鹽花也其􅀈竹制長四寸一分闊九分􅀈䇿也熟盂熟盂以貯熟水或瓷或沙受二升碗碗越州上鼎州次婺州次嶽州次夀州洪州次或者以邢州處越州上殊為不然若邢瓷類銀越瓷類玉邢不如越一也若邢瓷類雪則越瓷類氷邢不如越二也邢瓷白而茶色丹越瓷青而茶色緑邢不如越三也晉杜育荈賦所謂器擇陶㨂出自東甌甌越也甌越州上口脣不卷底卷而淺受半升已下越州瓷嶽瓷皆青青則益茶茶作白紅之色邢州瓷白茶色紅夀州瓷黃茶色紫洪州瓷褐茶色黑皆不宜茶畚畚以白蒲捲而編之可貯碗十枚或用筥其紙帊以剡紙夾縫令方亦十之也札札緝栟櫚皮以茱萸木夾而縛之或截竹束而管之若巨筆形滌方滌方以貯滌洗之餘用楸木合之制如水方受八升滓方滓方以集諸滓製如滌方處五升巾巾以絁布為之長二尺作二枚互用之以潔諸器具列具列或作床或作架或純木純竹而製之或木或竹黃黑可局而漆者長三尺闊二尺髙六寸具列者悉斂諸器物悉以陳列也都籃都籃以悉設諸器而名之以竹篾內作三角方眼外以雙篾闊者經之以單篾纎者縛之遞壓雙經作方眼使玲瓏髙一尺五寸底闊一尺髙二寸長二尺四寸闊二尺茶經卷中
