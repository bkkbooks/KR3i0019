body:
  text: 茶經卷下唐陸羽撰五茶之煑凡炙茶慎勿於風燼間炙熛焰如鑚使炎涼不均持以逼火屢其飜正候炮普教反出培塿狀蝦蟇背然後去火五寸卷而舒則本其始又炙之若火乾者以氣熟止日乾者以柔止其始若茶之至嫩者蒸罷熱搗葉爛而牙笋存焉假以力者持千鈞杵亦不之爛如漆科珠壯士接之不能駐其指及就則似無禳骨也炙之則其節若倪倪如嬰兒之臂耳既而承熱用紙囊貯之精華之氣無所散越候寒末之末之上者其屑如細米末之下者其屑如菱角其火用炭次用勁薪謂桑槐桐櫪之類也其炭曽經燔炙為膻膩所及及膏木敗器不用之膏木為柏桂檜也敗器謂朽廢等也古人有勞薪之味信哉其水用山水上江水中井水下荈賦所謂水則岷方之注揖彼清流其山水揀乳泉石池慢流者上其瀑湧湍漱勿食之乆食令人有頸疾又多别流於山谷者澄浸不洩自火天至霜郊以前或潛龍蓄毒於其間飲者可決之以流其惡使新泉涓涓然酌之其江水取去人逺者井水取汲多者其沸如魚目微有聲為一沸緣邉如湧泉連珠為二沸騰波鼓浪為三沸已上水老不可食也初沸則水合量調之以鹽味謂棄其啜餘啜嘗也市税反又市悦反無迺􅷮􅲃而鍾其一味乎上古暫反下吐濫反無味也第二沸出水一瓢以竹筴環激湯心則量未當中心而下有頃勢若奔濤濺沫以所出水止之而育其華也凡酌置諸盌令沫餑均字書并本草餑均茗沫也蒲笏反沫餑湯之華也華之薄者曰沫厚者曰餑細輕者曰花如棗花漂漂然於環池之上又如迴潭曲渚青萍之始生又如晴天爽朗有浮雲鱗然其沫者若緑錢浮於水渭又如菊英墮於樽俎之中餑者以滓煑之及沸則重華累沫皤皤然若積雪耳荈賦所謂焕如積雪曄若春􅞉有之第一煑水沸而棄其沫之上有水膜如黑雲毋飲之則其味不正其第一者為雋永徐縣全縣二反至美者曰雋永雋味也永長也史長曰雋永漢書通著雋永二十篇也或留熟以貯之以備育華救沸之用諸第一與第二第三盌次之第四第五盌外非渇甚莫之飲凡煑水一升酌分五盌盌數少至三多至五若人多至十加兩爐乗熱連飲之以重濁凝其下精英浮其上如冷則精英隨氣而竭飲啜不消亦然矣茶性儉不宜廣則其味黯澹且如一滿盌啜半而味寡况其廣乎其色緗也其馨􅸆也香至美曰􅸆􅸆音使其味甘檟也不甘而苦荈也啜苦咽甘茶也一本云其味苦而不甘檟也甘而不苦荈也六茶之飲翼而飛毛而走呿而言此三者俱生於天地間飲啄以活飲之時義逺矣哉至若救渇飲之以漿蠲憂忿飲之以酒蕩昏寐飲之以茶茶之為飲發乎神農氏聞於魯周公齊有晏嬰漢有揚雄司馬相如吳有韋曜晉有劉琨張載逺祖納謝安左思之徒皆飲焉滂時浸俗盛於國朝兩都并荆俞間以為比屋之飲飲有觕茶散茶末茶餅茶者乃斫乃熬乃煬乃舂貯於瓶缶之中以湯沃焉謂之痷茶或用䓗薑棗橘皮茱萸薄荷之等煑之百沸或揚令滑或煑去沫斯溝渠間棄水耳而習俗不已於戲天育萬物皆有至妙人之所工但獵淺易所庇者屋屋精極所著者衣衣精極所飽者飲食食與酒皆精極之茶有九難一曰造二曰別三曰器四曰火五曰水六曰炙七曰末八曰煑九曰飲隂採夜焙非造也嚼味嗅香非别也羶鼎腥甌非器也膏薪庖炭非火也飛湍壅潦非水也外熟内生非炙也碧粉縹塵非末也操艱攪遽非煑也夏興冬廢非飲也夫珍鮮馥烈者其盌數三次之者盌數五若坐客數至五行三盌至七行五盌若六人以下不約盌數但闕一人而已其雋永補所闕人七茶之事三皇炎帝神農氏周魯周公旦齊相晏嬰漢仙人丹丘子黄山君司馬文園令相如楊執㦸雄吳歸命侯韋太傅𢎞嗣晉惠帝劉司空琨琨兄子兖州刺史演張黄門孟陽傅司咸江洗馬統孫參軍楚左記室太冲陸吳興納納兄子㑹稽内史俶謝冠軍安石郭𢎞農璞桓揚州温杜舎人毓武康小山寺釋法瑤沛國夏侯愷餘姚虞洪北地傅巽丹陽𢎞君舉安任育長宣城秦精燉煌單道開剡縣陳務妻廣陵老姥河内山謙之後魏瑯琊王肅宋新安王子鸞鸞弟豫章王子尚鮑照妹令暉八公山沙門譚濟齊世祖武帝梁劉廷尉陶先生𢎞景皇朝徐英公勣神農食經茶茗久服令人有力悦志周公爾雅檟苦茶廣雅云荆巴間採葉作餅葉老者餠成以米膏出之欲煑茗飲先炙令赤色搗末置瓷器中以湯澆覆之用䓗薑橘子芼之其飲醒酒令人不眠晏子春秋嬰相齊景公時食脱粟之飯炙三弋五卵茗菜而已司馬相如凡將篇烏喙桔梗芫華款冬貝母木蘖蔞芩草芍藥桂漏蘆蜚廉雚菌荈詫白歛白芷菖蒲芒消莞椒茱茰方言蜀西南人謂茶曰蔎吳志韋曜𫝊孫皓毎饗宴坐席無不率以七升為限雖不盡入口皆澆灌取盡曜飲酒不過二升皓初禮異宻賜茶荈以代酒晉中興書陸納為吳興太守時衛將軍謝安常欲詣納晉書云納為吏部尚書納兄子俶怪納無所備不敢問之乃私蓄十數人饌安既至所設惟茶果而已俶遂陳盛饌珍羞畢具及安去納杖俶四十云汝既不能光益叔父奈何穢吾素業晉書桓温為揚州牧性儉毎讌飲惟下七奠拌茶果而已搜神記夏侯愷因疾死宗人字茍奴察見鬼神見愷來收馬并病其妻著平上幘單衣入坐生時西壁大牀就人覓茶飲劉琨與兄子南兖州刺史演書云前得安州乾薑一斤桂一斤黄芩一斤皆所須也吾體中潰悶常仰眞茶汝可置之傅咸司隷教曰聞南方有以困蜀嫗作茶粥賣為羣吏打破其器具嗣又賣餠於市而禁茶粥以蜀姥何哉神異記餘姚人虞洪入山採茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給祈子他日有甌犧之餘乞相遺也因立奠祀後常令家人入山獲大茗焉左思嬌女詩吾家有嬌女皎皎頗白晳小字為紈素口齒自清歴有姊字惠芳眉目粲如畫馳騖翔園林果下皆生摘貪華風雨中倐忽數百適心為茶荈劇吹噓對鼎䥶張孟陽登成都樓詩云借問楊子舎想見長卿廬程卓累千金驕侈擬五侯門有連騎客翠帶腰吳鉤鼎食隨時進百和妙且殊披林採秋橘臨江釣春魚黑子過龍醢果饌踰蟹蝑芳茶冠六情溢味播九區人生茍安樂兹土聊可娱傅巽七誨蒲桃宛柰齊柿燕栗峘陽黄梨巫山朱橘南中茶子西極石蜜𢎞君舉食檄寒温既畢應下霜華之茗三爵而終應下諸蔗木𤓰元李楊梅五味橄欖懸豹葵羮各一杯孫楚歌茱萸出芳樹顛鯉魚出洛水泉白鹽出河東美豉出魯淵薑桂茶荈出巴蜀椒橘木蘭出髙山蓼蘇出溝渠精稗出中田華佗食論苦茶乆食益意思壺居士食忌苦茶乆食羽化與韮同食令人體重郭璞爾雅注云樹小似梔子冬生葉可煮羮飲今呼早取為茶晚取為茗或一曰荈蜀人名之苦茶世説任瞻字育長少時有令名自過江失志既下飲問人云此為茶為茗覺人有怪色乃自分眀云向問飲為熱為冷續搜神記晉武帝宣城人秦精常入武昌山採茗遇一毛人長丈餘引精至山下示以藂茗而去俄而復還乃探懐中橘以遺精精怖負茗而歸晉四王起事惠帝蒙塵還洛陽黄門以瓦盂盛茶上至尊異苑剡縣陳務妻少與二子寡居好飲茶茗以宅中有古塜毎飲輒先祀之二子患之曰古塜何知徒以勞意欲掘去之母苦禁而止其夜夢一人云吾止此塜三百餘年卿二子恒欲見毁賴相保䕶又享吾佳茗雖潛壤朽骨豈忘翳桑之報及曉於庭中獲錢十萬似乆埋者但貫新耳母告二子慙之従是禱饋愈甚廣陵耆老𫝊晉元帝時有老姥毎旦獨提一器茗往市鬻之市人競買自旦至夕其器不減所得錢散路傍孤貧乞人人或異之州法曹縶之獄中至夜老姥執所鬻茗器従獄牗中飛出藝術傳燉煌人單道開不畏寒暑常服小石子所服藥有松桂蜜之氣所餘茶蘇而已釋道該説續名僧𫝊宋釋法瑶姓楊氏河東人永嘉中過江遇沈臺真臺真在武康小山寺年垂懸車飯所飲茶永明中勅呉興禮致上京年七十九宋江氏家𫝊江統字應遷愍懐太子洗馬常上疏諫云今西園賣醯麫藍子菜茶之屬虧敗國體宋録新安王子鸞豫章王子尚詣曇濟道人於八公山道人設茶茗子尚味之曰此甘露也何言茶茗王微雜詩寂寂掩髙閣寥寥空廣厦待君竟不歸收領今就檟鮑照妹令暉著香茗賦南齊世祖武皇帝遺詔我靈座上慎勿以牲為祭但設餅果茶飲乾飯酒脯而已梁劉孝綽謝晉安王餉米等啓𫝊詔李孟孫宣教㫖垂賜米酒𤓰荀𦵔脯酢茗八種氣苾新城味芳雲松江潭抽節邁昌荇之珍疆場擢翹越茸精之美羞非純束野麏裛似雪之驢鮓異陶瓶河鯉操如瓊之粲茗同食粲酢類望柑免千里宿舂省三月種聚小人懐恵大懿難忘陶景雜録苦茶輕換膏昔丹丘子責山君服之後魏録瑯琊王肅仕南朝好茗飲蓴羮及還北地又好羊肉酪漿人或問之茗何如酪肅曰茗不堪與酪為奴桐君録西陽武昌廬江晉陵好茗皆東人作清茗茗有餑飲之宜人凡可飲之物皆多取其葉天門冬扷揳取根皆益人又巴東别有眞茗茶煎飲令人不眠俗中多煑檀葉并大皁李作茶並冷又南方有𤓰蘆木亦似茗至苦澁取為屑茶飲亦可通夜不眠煑鹽人但資此飲而交廣最重客來先設乃加以香芼輩坤元録辰州溆浦縣西北三百五十里無射山云蠻俗當吉慶之時親族集㑹歌舞於山上山多茶樹括地圖臨遂縣東一百四十里有茶溪山謙之吴興記烏程縣西二十里有温山出御荈夷陵州圖經黄牛荆門女觀望等山茶茗出焉永嘉圖經永嘉縣東三百里有白茶山淮隂圖經山陽縣南二十里有茶坡茶陵圖經云茶陵者所謂陵谷生茶茗焉本草木部茗苦茶味甘苦微寒無毒主瘻瘡利小便去痰渇熱令人少睡秋採之苦主下氣消食注云春採之本草菜部苦茶一名茶一名選一名游冬生益州川谷山陵道傍凌冬不死三月三日採乾注云疑此即是今茶一名荼令人不眠本草注按詩云誰謂荼苦又云堇荼如飴皆苦菜也陶謂之苦茶木類非菜流茗春採謂之苦􅖗途遐反枕中方療積年瘻苦茶蜈蚣並炙令香熟等分搗篩煑甘草湯洗以末𫝊之孺子方療小兒無故驚蹶以苦茶葱鬚煑服之八茶之出山南以峽州上峽州生逺安宜都夷陵三縣山谷襄州荆州次襄州生南鄭縣山谷荆州生江陵縣山谷衡州下生衡州茶陵二縣山谷金州梁州又下金州生西城安康二縣山谷梁州生襄城金牛二縣山谷淮南以光州上生光山縣黄頭港者與峽州同義陽郡舒州次生義陽縣鍾山者與襄州同舒州生太湖縣潜山者與荆州同夀州下盛唐縣生霍山者與衡山同也蘄州黄州又下蘄州生黄梅縣山谷黄州生麻城縣山谷並與荆州梁州同也浙西以湖州上湖州生長城縣顧渚山谷與峽州光州同生烏瞻山天目山白茅山懸脚嶺與襄州荆南義陽郡同生鳯亭山伏翼闇飛雲曲水二寺啄木嶺與夀州常州同生安吉武康二縣山谷與金州梁州同常州次常州義興縣生君山懸脚嶺北峰下與荆州義陽郡同生圏嶺善權寺石亭山與舒州同宣州杭州睦州歙州下宣州生宣城縣雅山與蘄州同太平縣生上睦臨睦與黄州同杭州臨安於潜二縣生天目山與舒州同錢塘生天竺靈𨼆二寺睦州生桐廬縣山谷歙州生婺源山谷與衡州同潤州蘇州又下潤州江寧縣生傲山蘇州長州縣生洞庭山與金州蘄州梁州同劒南以彭州上生九隴縣馬鞍山至德寺棚口與襄州同綿州蜀州次綿州龍安縣生松嶺關與荆州同其西昌昌明神泉縣西山者並佳有過松嶺者不堪採蜀州青城縣生丈人山與綿州同青城縣有散茶木茶卭州次雅州瀘州下雅州百丈山名山瀘州瀘川者與金州同眉州漢州又下眉州丹校縣生鐡山者漢州綿竹縣生竹山者與潤州同浙東以越州上餘姚縣生瀑布泉嶺曰仙茗大者殊異小者與襄州同明州婺州次明州􅀈縣生榆筴村婺州東陽縣東自山與荆州同台州下台州豐縣生赤城者與歙州同黔中生恩州播州費州夷州江南生鄂州袁州吉州嶺南生福州建州韶州象州福州生閩方山之隂縣也其恩播費夷鄂袁吉福建泉韶象十一州未詳徃徃得之其味極佳九茶之略其造具若方春禁火之時於野寺山園叢手而掇乃蒸乃舂乃煬以火乾之則又棨撲焙貫棚穿育等七事皆廢其煑器若松間石上可坐則具列廢用槁薪鼎櫪之屬則風燼灰承炭檛火筴交床等廢若瞰泉臨澗則水方滌方漉水囊廢若五人已下茶可末而精者則羅廢若援藟躋嵓引絙入洞於山口炙而末之或紙包合貯則碾拂末等廢既瓢盌筴札熟盂醝簋悉以一筥盛之則都籃廢但城邑之中王公之門二十四器闕一則茶廢矣十茶之圖以絹素或四幅或六幅分布寫之陳諸座隅則茶之源之具之造之器之煑之飲之事之出之畧目擊而存於是茶經之始終備焉茶經卷下
