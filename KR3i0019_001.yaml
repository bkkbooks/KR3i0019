body:
  text: 茶經卷上唐陸羽撰一茶之源茶者南方之嘉木也一尺二尺迺至數十尺其巴山峽川有兩人合抱者伐而掇之其樹如𤓰蘆葉如梔子花如白薔薇實如栟櫚蒂如丁香根如胡桃𤓰蘆木出廣州似茶至苦澁栟櫚蒲葵之屬其子似茶胡桃與茶根皆下孕兆至瓦礫苗本上抽其字或従草或従木或草木并從草當作茶其字出開元文字者義從木當作􅖗其字出本草草木并作茶其字出爾雅其名一曰茶二曰檟三曰蔎四曰茗五曰荈周公云檟苦茶楊執㦸云蜀西南人謂茶曰蔎郭𢎞農云早取為茶晚取為茗或一曰荈耳其地上者生爛石中者生櫟壤下者生黄土凡藝而不實植而罕茂法如種𤓰三嵗可採野者上園者次陽崖隂林紫者上緑者次笋者上牙者次葉卷上葉舒次隂山坡谷者不堪採掇性凝滯結瘕疾茶之為用味至寒為飲最宜精行儉徳之人若熱渇凝悶腦疼目澁四支煩百節不舒聊四五啜與醍醐甘露抗衡也採不時造不精雜以卉莽飲之成疾茶為累也亦猶人參上者生上黨中者生百濟新羅下者生髙麗有生澤州易州幽州檀州者為藥無效况非此者設服薺苨使六疾不瘳知人參為累則茶累盡矣二茶之具籝加反追一曰籃一曰籠一曰筥以竹織之受五升或一㪷二㪷三㪷者茶人負以採茶也籝漢書音盈所謂黄金滿籝不如一經顔師古云籝竹器也受四升耳竈無用突者釜用脣口者甑或木或瓦匪腰而泥籃以箄之篾以系之始其蒸也入乎箄既其熟也出乎箄釜涸注於甑中甑不帶而泥之又以榖木枝三亞者制之散所蒸牙笋并葉畏流其膏杵臼一曰碓惟恒用者佳規一曰模一曰棬以鐵制之或圓或方或花承一曰臺一曰砧以石為之不然以槐桑木半埋地中遣無所搖動檐一曰衣以油絹或雨衫單服敗者為之以檐置承上又以規置檐上以造茶也茶成舉而易之芘莉音杷離一曰嬴子一曰篣筤以二小竹長三尺軀二尺五寸柄五寸以篾織方眼如圃人土羅闊二尺以列茶也棨一曰錐刀柄以堅木為之用穿茶也撲一曰鞭以竹為之穿茶以解茶也焙鑿地深二尺闊二尺五寸長一丈上作短墻髙二尺泥之貫削竹為之長二尺五寸以貫茶焙之棚一曰棧以木構於焙上編木兩層髙一尺以焙茶也茶之半乾昇下棚全乾昇上棚穿音釧江東淮南剖竹為之巴川峽山紉榖皮為之江東以一斤為上穿半斤為中穿四兩五兩為小穿峽中以一百二十斤為上穿八十斤為中穿五十斤為小穿字舊作釵釧之釧字或作貫串今則不然如磨扇彈鑚縫五字文以平聲書之義以去聲呼之其字以穿名之育以木制之以竹編之以紙糊之中有隔上有覆下有床傍有門掩一扇中置一器貯煻煨火令煴煴然江南梅雨時焚之以火育者以其藏養為名三茶之造凡採茶在二月三月四月之間茶之笋者生爛石沃土長四五寸若薇蕨始抽凌露採焉茶之牙者發於藂薄之上有三枝四枝五枝者選其中枝穎㧞者採焉其日有雨不採晴有雲不採晴採之蒸之擣之拍之焙之穿之封之茶之乾矣茶有千萬狀鹵莽而言如胡人鞾者蹙縮然謂文也犎牛臆者㢘襜然浮雲出山者輪囷然輕飈拂水者涵澹然有如陶家之子羅膏土以水澄泚之謂澄泥也又如新治地者遇暴雨流潦之所經此皆茶之精腴有如竹籜者枝榦堅實艱於蒸搗故其形籭簁然上离下師有如霜荷者莖葉凋沮易其狀貌故厥狀委萃然此皆茶之瘠老者也自採至於封七經目自胡鞾至於霜荷八等或以光黑平正言嘉者斯鑒之下也以皺黄坳垤言佳者鑒之次也若皆言嘉及皆言不嘉者鑒之上也何者出膏者光含膏者皺宿製者則黑日成者則黄蒸壓則平正縱之則坳垤此茶與草木葉一也茶之臧否存於口訣茶經卷上
